name: Release - 发布编译

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      core_ref:
        description: 'connect-ip-tunnel 内核分支/tag（默认 main）'
        required: false
        default: 'main'
      version:
        description: '发布版本号（手动触发时使用，例如 v1.0.0-beta）'
        required: false
        default: 'dev'

jobs:
  build:
    name: 发布编译 (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            platform: linux
            arch: amd64
            core_goos: linux
            core_goarch: amd64
            gui_artifact: connect-ip-tunnel-gui
            pkg_ext: tar.gz

          - name: Linux ARM64
            os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            core_goos: linux
            core_goarch: arm64
            gui_artifact: connect-ip-tunnel-gui
            pkg_ext: tar.gz

          - name: Windows x86_64
            os: windows-latest
            platform: windows
            arch: amd64
            qt_arch: win64_msvc2019_64
            core_goos: windows
            core_goarch: amd64
            gui_artifact: connect-ip-tunnel-gui.exe
            pkg_ext: zip

          - name: macOS Universal
            os: macos-latest
            platform: darwin
            arch: universal
            qt_arch: clang_64
            core_goos: darwin
            core_goarch: arm64
            gui_artifact: connect-ip-tunnel-gui
            pkg_ext: tar.gz

    steps:
      - name: Checkout GUI
        uses: actions/checkout@v4

      - name: Checkout 内核
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/connect-ip-tunnel
          ref: ${{ inputs.core_ref || 'main' }}
          path: core

      # ── 版本号 ───────────────────────────────────────────────────
      - name: 确定版本号
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ inputs.version }}" && "${{ inputs.version }}" != "dev" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "pkg_name=connect-ip-tunnel-gui-${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}" >> $GITHUB_OUTPUT

      # ── Go 编译内核 ──────────────────────────────────────────────
      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      - name: 编译内核
        shell: bash
        working-directory: core
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.core_goos }}
          GOARCH: ${{ matrix.core_goarch }}
        run: |
          EXT=""
          [[ "${{ matrix.platform }}" == "windows" ]] && EXT=".exe"
          go build \
            -ldflags="-s -w -X connect-ip-tunnel/server.Version=${{ steps.version.outputs.version }}" \
            -trimpath \
            -o "../dist/connect-ip-tunnel${EXT}" \
            ./cmd/app

      # ── Qt6 安装 ─────────────────────────────────────────────────
      - name: 安装 Qt6 + 构建工具（Linux）
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            qt6-base-dev libqt6widgets6 libqt6network6 \
            cmake ninja-build

      - name: 安装 Qt6（Windows/macOS）
        if: matrix.platform != 'linux'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          arch: ${{ matrix.qt_arch }}
          cache: true

      # ── 编译 GUI ─────────────────────────────────────────────────
      - name: 配置 CMake
        shell: bash
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            ${{ matrix.platform == 'linux' && '-G Ninja' || '' }}

      - name: 编译 GUI
        shell: bash
        run: cmake --build build --config Release --parallel

      # ── 收集产物 ─────────────────────────────────────────────────
      - name: 收集产物（macOS）
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          mkdir -p dist
          # CMake MACOSX_BUNDLE 产物是 .app bundle
          APP_BUNDLE=""
          for p in build/Release/connect-ip-tunnel-gui.app build/connect-ip-tunnel-gui.app; do
            [ -d "$p" ] && APP_BUNDLE="$p" && break
          done
          cp -R "${APP_BUNDLE}" dist/connect-ip-tunnel-gui.app
          # 将内核放入 .app/Contents/MacOS/，与 GUI 同目录，findCoreExecutable() 可直接找到
          cp dist/connect-ip-tunnel \
             dist/connect-ip-tunnel-gui.app/Contents/MacOS/connect-ip-tunnel
          # macdeployqt 处理 .app bundle，自动收集 Qt framework
          "${QT_ROOT_DIR}/bin/macdeployqt" \
            dist/connect-ip-tunnel-gui.app -verbose=1 || true
          # 打包（整个 .app bundle）
          cd dist
          tar -czf "../${{ steps.version.outputs.pkg_name }}.${{ matrix.pkg_ext }}" connect-ip-tunnel-gui.app
          cd ..

      - name: 收集产物（Linux x86_64，AppImage）
        if: matrix.platform == 'linux' && matrix.arch == 'amd64'
        shell: bash
        run: |
          mkdir -p dist AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          # 找到 GUI 二进制
          GUI_BIN=""
          for p in build/${{ matrix.gui_artifact }} build/Release/${{ matrix.gui_artifact }}; do
            [ -f "$p" ] && GUI_BIN="$p" && break
          done
          cp "${GUI_BIN}" AppDir/usr/bin/connect-ip-tunnel-gui
          # 复制内核到 AppDir
          cp dist/connect-ip-tunnel AppDir/usr/bin/ 2>/dev/null || true
          # .desktop 文件（不能有缩进）
          printf '[Desktop Entry]\nName=Connect-IP Tunnel\nExec=connect-ip-tunnel-gui\nIcon=connect-ip-tunnel-gui\nType=Application\nCategories=Network;\n' \
            > AppDir/usr/share/applications/connect-ip-tunnel-gui.desktop
          # 使用真实的 256x256 图标
          cp resources/app_256.png AppDir/usr/share/icons/hicolor/256x256/apps/connect-ip-tunnel-gui.png
          # 找到系统 qmake
          QMAKE=$(command -v qmake6 2>/dev/null || command -v qmake 2>/dev/null || echo "")
          # 下载 linuxdeployqt（仅支持 x86_64）
          wget -q -O linuxdeployqt \
            https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod +x linuxdeployqt
          export QML_SOURCES_PATHS=.
          export VERSION=${{ steps.version.outputs.version }}
          if [ -n "${QMAKE}" ]; then
            ./linuxdeployqt AppDir/usr/share/applications/connect-ip-tunnel-gui.desktop \
              -appimage -no-translations -no-copy-copyright-files \
              -qmake="${QMAKE}" || true
          else
            ./linuxdeployqt AppDir/usr/share/applications/connect-ip-tunnel-gui.desktop \
              -appimage -no-translations -no-copy-copyright-files || true
          fi
          # 移动 AppImage 到 dist
          mv Connect*.AppImage "dist/${{ steps.version.outputs.pkg_name }}.AppImage" 2>/dev/null || \
          mv *.AppImage "dist/${{ steps.version.outputs.pkg_name }}.AppImage" 2>/dev/null || true
          # 打包
          cd dist
          tar -czf "../${{ steps.version.outputs.pkg_name }}.${{ matrix.pkg_ext }}" .
          cd ..

      - name: 收集产物（Linux ARM64）
        if: matrix.platform == 'linux' && matrix.arch == 'arm64'
        shell: bash
        run: |
          mkdir -p dist
          # 找到 GUI 二进制（ARM64 无 linuxdeployqt，直接打包二进制）
          for p in build/${{ matrix.gui_artifact }} build/Release/${{ matrix.gui_artifact }}; do
            [ -f "$p" ] && cp "$p" dist/ && break
          done
          # 复制内核
          cp dist/connect-ip-tunnel dist/ 2>/dev/null || true
          # 打包
          cd dist
          tar -czf "../${{ steps.version.outputs.pkg_name }}.${{ matrix.pkg_ext }}" .
          cd ..

      - name: 下载 wintun.dll（Windows）
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          # wintun 是 Windows TUN 驱动，内核在 Windows 上启动 TUN 设备时必需
          curl -sSL https://www.wintun.net/builds/wintun-0.14.1.zip -o wintun.zip
          7z e wintun.zip "wintun/bin/amd64/wintun.dll" -o dist/ -y
          echo "✓ wintun.dll: $(ls -lh dist/wintun.dll)"

      - name: 收集产物（Windows）
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          mkdir -p dist
          # GUI 二进制
          cp build/Release/${{ matrix.gui_artifact }} dist/ 2>/dev/null || \
          cp build/${{ matrix.gui_artifact }} dist/ 2>/dev/null || true
          # 内核
          cp dist/connect-ip-tunnel.exe dist/ 2>/dev/null || true
          # windeployqt 收集 Qt 运行时 DLL
          QT_BIN="${QT_ROOT_DIR}/bin"
          "${QT_BIN}/windeployqt.exe" \
            --release \
            --no-translations \
            --no-system-d3d-compiler \
            --no-opengl-sw \
            dist/${{ matrix.gui_artifact }}
          # 确认 wintun.dll 已在 dist/（上一步下载）
          ls dist/wintun.dll
          # 打包（包含：GUI.exe、内核.exe、Qt DLL、wintun.dll）
          cd dist
          7z a "../${{ steps.version.outputs.pkg_name }}.${{ matrix.pkg_ext }}" .
          cd ..

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.pkg_name }}
          path: ${{ steps.version.outputs.pkg_name }}.${{ matrix.pkg_ext }}

  # ── 创建 GitHub Release ─────────────────────────────────────────
  release:
    name: 创建 GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # 仅 tag push 或手动指定版本号时发布
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.version != 'dev')
    permissions:
      contents: write

    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 列出产物
        run: ls -lh artifacts/

      - name: 确定版本号
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Connect-IP Tunnel GUI ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'rc') }}
          generate_release_notes: true
          files: artifacts/*
