name: CI - 测试编译

on:
  workflow_dispatch:
    inputs:
      core_ref:
        description: 'connect-ip-tunnel 内核分支/tag（默认 main）'
        required: false
        default: 'main'

jobs:
  build:
    name: 测试编译 (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            platform: linux
            arch: amd64
            qt_arch: linux_gcc_64
            core_suffix: linux-amd64

          - name: Linux ARM64
            os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            core_suffix: linux-arm64

          - name: Windows x86_64
            os: windows-latest
            platform: windows
            arch: amd64
            qt_arch: win64_msvc2019_64
            core_suffix: windows-amd64.exe

          - name: macOS ARM64 (Apple Silicon)
            os: macos-latest
            platform: darwin
            arch: arm64
            qt_arch: clang_64
            core_suffix: darwin-arm64

          - name: macOS x86_64
            os: macos-13
            platform: darwin
            arch: amd64
            qt_arch: clang_64
            core_suffix: darwin-amd64

    steps:
      - name: Checkout GUI
        uses: actions/checkout@v4

      - name: Checkout 内核
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/connect-ip-tunnel
          ref: ${{ inputs.core_ref }}
          path: core

      # ── Go 编译内核 ──────────────────────────────────────────────
      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      - name: 编译内核
        working-directory: core
        shell: bash
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w" \
            -trimpath \
            -o ../dist/connect-ip-tunnel${{ matrix.platform == 'windows' && '.exe' || '' }} \
            ./cmd/app

      # ── Qt6 安装 ─────────────────────────────────────────────────
      - name: 安装 Qt6（Linux）
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            qt6-base-dev libqt6widgets6 libqt6network6 \
            cmake ninja-build

      - name: 安装 Qt6（Windows/macOS）
        if: matrix.platform != 'linux'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          arch: ${{ matrix.qt_arch }}
          cache: true

      # ── 编译 GUI ─────────────────────────────────────────────────
      - name: 配置 CMake（Linux）
        if: matrix.platform == 'linux'
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: 配置 CMake（Windows/macOS）
        if: matrix.platform != 'linux'
        shell: bash
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release

      - name: 编译 GUI
        run: cmake --build build --config Release --parallel
        shell: bash

      # ── 收集产物 ─────────────────────────────────────────────────
      - name: 收集产物（macOS）
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          mkdir -p dist
          GUI_BIN=""
          for p in build/Release/connect-ip-tunnel-gui build/connect-ip-tunnel-gui; do
            [ -f "$p" ] && GUI_BIN="$p" && break
          done
          cp "${GUI_BIN}" dist/connect-ip-tunnel-gui
          "${QT_ROOT_DIR}/bin/macdeployqt" "dist/connect-ip-tunnel-gui" -verbose=1 || true
          cp dist/connect-ip-tunnel dist/ 2>/dev/null || true

      - name: 收集产物（Linux x86_64，AppImage）
        if: matrix.platform == 'linux' && matrix.arch == 'amd64'
        shell: bash
        run: |
          mkdir -p dist AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          GUI_BIN=""
          for p in build/connect-ip-tunnel-gui build/Release/connect-ip-tunnel-gui; do
            [ -f "$p" ] && GUI_BIN="$p" && break
          done
          cp "${GUI_BIN}" AppDir/usr/bin/connect-ip-tunnel-gui
          cp dist/connect-ip-tunnel AppDir/usr/bin/ 2>/dev/null || true
          printf '[Desktop Entry]\nName=Connect-IP Tunnel\nExec=connect-ip-tunnel-gui\nIcon=connect-ip-tunnel-gui\nType=Application\nCategories=Network;\n' \
            > AppDir/usr/share/applications/connect-ip-tunnel-gui.desktop
          touch AppDir/usr/share/icons/hicolor/256x256/apps/connect-ip-tunnel-gui.png
          QMAKE=$(command -v qmake6 2>/dev/null || command -v qmake 2>/dev/null || echo "")
          wget -q -O linuxdeployqt \
            https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod +x linuxdeployqt
          export QML_SOURCES_PATHS=.
          if [ -n "${QMAKE}" ]; then
            ./linuxdeployqt AppDir/usr/share/applications/connect-ip-tunnel-gui.desktop \
              -appimage -no-translations -no-copy-copyright-files \
              -qmake="${QMAKE}" || true
          else
            ./linuxdeployqt AppDir/usr/share/applications/connect-ip-tunnel-gui.desktop \
              -appimage -no-translations -no-copy-copyright-files || true
          fi
          mv Connect*.AppImage dist/connect-ip-tunnel-gui.AppImage 2>/dev/null || \
          mv *.AppImage dist/connect-ip-tunnel-gui.AppImage 2>/dev/null || true

      - name: 收集产物（Linux ARM64）
        if: matrix.platform == 'linux' && matrix.arch == 'arm64'
        shell: bash
        run: |
          mkdir -p dist
          for p in build/connect-ip-tunnel-gui build/Release/connect-ip-tunnel-gui; do
            [ -f "$p" ] && cp "$p" dist/ && break
          done
          cp dist/connect-ip-tunnel dist/ 2>/dev/null || true

      - name: 收集产物（Windows）
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          mkdir -p dist
          cp build/Release/connect-ip-tunnel-gui.exe dist/ 2>/dev/null || \
          cp build/connect-ip-tunnel-gui.exe dist/ 2>/dev/null || true
          cp dist/connect-ip-tunnel.exe dist/ 2>/dev/null || true
          "${QT_ROOT_DIR}/bin/windeployqt.exe" \
            --release \
            --no-translations \
            --no-system-d3d-compiler \
            --no-opengl-sw \
            dist/connect-ip-tunnel-gui.exe

      - name: 上传产物（供检查）
        uses: actions/upload-artifact@v4
        with:
          name: connect-ip-tunnel-gui-${{ matrix.platform }}-${{ matrix.arch }}-ci
          retention-days: 3
          path: dist/
